{% extends "layout/Mortor_base.html" %}

{% block title %}設施管理 - 列表{% endblock %}

{% block page_title %}設施管理{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{{ url_for('web.dashboard') }}">首頁</a></li>
<li class="breadcrumb-item active">設施列表</li>
{% endblock %}

{% block content %}
<style>
    /* Fix Select2 height to match Bootstrap form-control */
    .select2-container .select2-selection--single {
        height: 38px !important;
    }

    .select2-container--default .select2-selection--single .select2-selection__rendered {
        line-height: 36px !important;
    }

    .select2-container--default .select2-selection--single .select2-selection__arrow {
        height: 36px !important;
    }
</style>
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">設施列表</h3>
                <div class="card-tools">
                    <button type="button" class="btn btn-tool" data-card-widget="collapse" title="Collapse">
                        <i class="fas fa-minus"></i>
                    </button>
                </div>
            </div>
            <div class="card-body">
                <!-- Filter Form -->
                <div class="row mb-3">
                    <div class="col-md-3">
                        <div class="form-group">
                            <label>所屬組織</label>
                            <select class="form-control select2" id="filter-org" style="width: 100%;">
                                <option value="">所有組織</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group">
                            <label>設施類型</label>
                            <select class="form-control" id="filter-type">
                                <option value="">所有類型</option>
                                <option value="Plant">廠區 (Plant)</option>
                                <option value="Building">廠房 (Building)</option>
                                <option value="Floor">樓層 (Floor)</option>
                                <option value="Area">區域 (Area)</option>
                                <option value="Room">機房 (Room)</option>
                                <option value="Route">巡檢路線 (Route)</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <div class="form-group w-100">
                            <button class="btn btn-primary w-100" id="btn-search">
                                <i class="fas fa-search"></i> 查詢
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Data Table -->
                <table id="facilities-table" class="table table-bordered table-striped">
                    <thead>
                        <tr>
                            <th>設施 ID</th>
                            <th>設施名稱</th>
                            <th>類型</th>
                            <th>上層設施</th>
                            <th>設備數量</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data will be loaded via AJAX -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function () {
        // Initialize Select2
        $('.select2').select2();

        // Load Organizations for Filter
        loadOrganizations();

        // Initialize DataTable
        var table = $('#facilities-table').DataTable({
            "responsive": true,
            "lengthChange": false,
            "autoWidth": false,
            "searching": false, // Custom search
            "serverSide": true,
            "processing": true,
            "ajax": {
                "url": "/api/v1/facilities/list",
                "type": "GET",
                "headers": {
                    "Authorization": "Bearer " + $('meta[name="api-token"]').attr('content')
                },
                "data": function (d) {
                    // Map DataTable parameters to API parameters
                    return {
                        draw: d.draw,
                        page: (d.start / d.length) + 1,
                        page_size: d.length,
                        org_id: $('#filter-org').val(),
                        unittype: $('#filter-type').val()
                    };
                },
                "dataFilter": function (data) {
                    var json = JSON.parse(data);
                    // Map API response to DataTable format
                    return JSON.stringify({
                        "draw": json.data.draw,
                        "recordsTotal": json.data.pagination.total,
                        "recordsFiltered": json.data.pagination.total,
                        "data": json.data.facilities
                    });
                }
            },
            "columns": [
                { "data": "unitid" },
                { "data": "unitname" },
                {
                    "data": "unittype",
                    "render": function (data, type, row) {
                        var badges = {
                            'Plant': 'primary',
                            'Building': 'info',
                            'Floor': 'success',
                            'Area': 'warning',
                            'Room': 'secondary',
                            'Route': 'dark'
                        };
                        return '<span class="badge badge-' + (badges[data] || 'secondary') + '">' + data + '</span>';
                    }
                },
                { "data": "parentunitid", "defaultContent": "-" },
                { "data": "equipment_count", "defaultContent": "0" },
                {
                    "data": null,
                    "render": function (data, type, row) {
                        return '<a href="/facility/' + row.unitid + '" class="btn btn-sm btn-info"><i class="fas fa-eye"></i> 查看</a>';
                    }
                }
            ],
            "language": {
                url: '/static/datatable_zh-Hant.json'
            }
        });

        // Search Button Click
        $('#btn-search').click(function () {
            table.ajax.reload();
        });

        function loadOrganizations() {
            $.ajax({
                url: '/api/v1/organizations/tree',
                type: 'GET',
                headers: {
                    "Authorization": "Bearer " + $('meta[name="api-token"]').attr('content')
                },
                success: function (response) {
                    if (response.status === 'success') {
                        var orgs = response.data.organizations;
                        var select = $('#filter-org');

                        // Helper to flatten tree for dropdown
                        function addOptions(nodes, level) {
                            nodes.forEach(function (node) {
                                var prefix = level > 0 ? '&nbsp;&nbsp;'.repeat(level) + '└ ' : '';
                                select.append(new Option(prefix + node.name, node.id));
                                if (node.children && node.children.length > 0) {
                                    addOptions(node.children, level + 1);
                                }
                            });
                        }

                        addOptions(orgs, 0);
                    }
                },
                error: function (xhr) {
                    console.error('Failed to load organizations');
                }
            });
        }
    });
</script>
{% endblock %}
