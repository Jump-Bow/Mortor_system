{% extends "layout/Mortor_base.html" %}

{% block title %}任務列表 - FEM 設備保養管理系統{% endblock %}
{% block page_title %}任務列表{% endblock %}
{% block breadcrumb_active %}任務列表{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">篩選條件</h3>
            </div>
            <div class="card-body">
                <form id="filterForm">
                    <div class="row">
                        <div class="col-md-3">
                            <div class="form-group">
                                <label>任務狀態</label>
                                <select class="form-control" id="status-filter" name="status">
                                    <option value="">全部狀態</option>
                                    <option value="未派工">未派工</option>
                                    <option value="執行中">執行中</option>
                                    <option value="已完成">已完成</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label>開始日期</label>
                                <input type="date" class="form-control" id="start-date" name="start_date">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label>結束日期</label>
                                <input type="date" class="form-control" id="end-date" name="end_date">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label>&nbsp;</label>
                                <div>
                                    <button type="button" class="btn btn-primary btn-block" onclick="searchTasks()">
                                        <i class="fas fa-search"></i> 查詢
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">任務列表</h3>
                <div class="card-tools">
                    <button type="button" class="btn btn-success btn-sm" onclick="createTask()">
                        <i class="fas fa-plus"></i> 新增任務
                    </button>
                </div>
            </div>
            <div class="card-body">
                <table id="taskTable" class="table table-bordered table-striped table-hover">
                    <thead>
                        <tr>
                            <th>任務編號</th>
                            <th>設備名稱</th>
                            <th>指派人員</th>
                            <th>檢查日期</th>
                            <th>狀態</th>
                            <th>完成率</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let taskTable;

    $(document).ready(function () {
        // Set default date range
        const today = new Date();
        const sevenDaysAgo = new Date(today);
        sevenDaysAgo.setDate(today.getDate() - 7);

        $('#end-date').val(today.toISOString().split('T')[0]);
        $('#start-date').val(sevenDaysAgo.toISOString().split('T')[0]);

        // Initialize DataTable
        initDataTable();

        // Load data
        searchTasks();
    });

    function initDataTable() {
        taskTable = $('#taskTable').DataTable({
            processing: true,
            serverSide: false,
            data: [],
            columns: [
                { data: 'act_key' },
                { data: 'equipment_name', defaultContent: '-' },
                { data: 'act_mem', defaultContent: '未指派' },
                { data: 'mdate' },
                {
                    data: 'status',
                    render: function (data) {
                        const badges = {
                            '未派工': 'badge-secondary',
                            '執行中': 'badge-info',
                            '已完成': 'badge-success'
                        };
                        const badgeClass = badges[data] || 'badge-secondary';
                        return `<span class="badge ${badgeClass}">${data}</span>`;
                    }
                },
                {
                    data: 'completion_rate',
                    render: function (data) {
                        const rate = data || 0;
                        return `
                        <div class="progress progress-xs">
                            <div class="progress-bar bg-success" style="width: ${rate}%"></div>
                        </div>
                        <small>${rate.toFixed(1)}%</small>
                    `;
                    }
                },
                {
                    data: null,
                    orderable: false,
                    render: function (data, type, row) {
                        return `
                        <button class="btn btn-sm btn-info" onclick="viewTask('${row.actid}')">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn btn-sm btn-warning" onclick="editTask('${row.actid}')">
                            <i class="fas fa-edit"></i>
                        </button>
                    `;
                    }
                }
            ],
            language: {
                url: '/static/datatable_zh-Hant.json'
            },
            order: [[3, 'desc']]
        });
    }

    function searchTasks() {
        const formData = $('#filterForm').serializeArray();
        const params = {};

        formData.forEach(function (item) {
            if (item.value) {
                params[item.name] = item.value;
            }
        });

        params.page = 1;
        params.page_size = 1000;

        $.ajax({
            url: '/api/v1/tasks/list',
            method: 'GET',
            data: params,
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('token')
            },
            success: function (response) {
                if (response.status === 'success') {
                    taskTable.clear();
                    taskTable.rows.add(response.data.tasks);
                    taskTable.draw();

                    toastr.success(`查詢到 ${response.data.pagination.total} 筆任務`);
                }
            },
            error: function (xhr) {
                if (xhr.status === 401) {
                    window.location.href = '/login';
                } else {
                    toastr.error('查詢失敗');
                }
            }
        });
    }

    function viewTask(taskId) {
        window.location.href = `/task/${taskId}`;
    }

    function editTask(taskId) {
        window.location.href = `/task/${taskId}/edit`;
    }

    function createTask() {
        window.location.href = '/task/create';
    }
</script>
{% endblock %}
